<div class="container-fluid card login-container">
    <h3 class="text-center mt-3">Register</h3>
    <hr>

    @if (errorMessage.length > 0) {
    <div class="alert alert-danger" role="alert">
        @for (msg of errorMessage; track $index) {
        <p>{{ msg }}</p>
        }
    </div>
    }

    <div class="mb-3">
        <label class="form-label">First Name</label>
        <input [(ngModel)]="registerRequest.firstName" type="text" class="form-control" id="firstname"
            placeholder="Enter your first name">
    </div>

    <div class="mb-3">
        <label class="form-label">Last Name</label>
        <input [(ngModel)]="registerRequest.lastName" type="text" class="form-control" id="lastname"
            placeholder="Enter your last name">
    </div>

    <div class="mb-3">
        <label class="form-label">Email address</label>
        <input [(ngModel)]="registerRequest.email" type="email" class="form-control" id="email"
            placeholder="xxx@example.com">
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input [(ngModel)]="registerRequest.password" type="password" class="form-control" id="password"
            placeholder="Enter your password">
    </div>

    <div class="d-flex justify-content-between mb-3">
        <button type="button" class="btn btn-primary" (click)="register()">
            <em class="fas fa-user-plus"></em>&nbsp;Sign Up
        </button>
    </div>
    <div>
        Already have an account?&nbsp;
        <button type="button" class="btn btn-link" (click)="login()">
            <em class="fas fa-sign-in-alt"></em>&nbsp;Login
        </button>
    </div>
</div>

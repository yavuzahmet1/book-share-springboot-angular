<div class="container-fluid card login-container">
    <h3 class="text-center mt-3">Login</h3>
    <hr>

    @if (errorMessage.length > 0) {
    <div class="alert alert-danger" role="alert">
        @for (msg of errorMessage; track $index) {
        <p>{{ msg }}</p>
        }
    </div>
    }

    <div class="mb-3">
        <label class="form-label">Email address</label>
        <input [(ngModel)]="authRequest.email" type="email" class="form-control" id="login"
            placeholder="xxx@example.com">
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input [(ngModel)]="authRequest.password" type="password" class="form-control" id="password"
            placeholder="Enter your password">
    </div>
    <div class="d-flex justify-content-between mb-3">
        <button type="button" class="btn btn-primary" (click)="login()">
            <em class="fas fa-sign-in-alt"></em>&nbsp;Sign In
        </button>
    </div>
    <div>
        Don't have an account?&nbsp;
        <button type="button" class="btn btn-link" (click)="register()">
            <em class="fas fa-user-plus"></em>&nbsp;Register
        </button>
    </div>
</div>

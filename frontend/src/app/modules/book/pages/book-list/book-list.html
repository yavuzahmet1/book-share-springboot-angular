<h3>Book List</h3>
@if (message) {
<div class="alert" [class.alert-danger]="level === 'error'" [class.alert-success]="level === 'success'" role="alert">
    {{ message }}
</div>
}
<hr>
<div class="d-flex justify-content-start gap-2 flex-wrap align-items-stretch">
    @for (bookItem of bookResponse.content; track bookItem.id) {
    <app-book-card [bookItem]="bookItem" (borrow)="borrowBook($event)"></app-book-card>
    } @empty {
    <div class="alert alert-info">The book list is empty.</div>
    }
</div>

<div class="d-flex justify-content-center mt-3">
    <nav aria-label="Page navigation">
        <ul class="pagination">

            <li class="page-item" [class.disabled]="page === 0">
                <a class="page-link" href="javascript:void(0)" (click)="goToFirstPage()" aria-label="First">
                    <span aria-hidden="true">&laquo;&laquo;</span> First
                </a>
            </li>

            <li class="page-item" [class.disabled]="page === 0">
                <a class="page-link" href="javascript:void(0)" (click)="goToPreviousPage()" aria-label="Previous">
                    <span aria-hidden="true">&laquo;</span> Previous
                </a>
            </li>

            @for (pIndex of pageNumbers; track pIndex) {
            <li class="page-item" [class.active]="page === pIndex">
                <a class="page-link" href="javascript:void(0)" (click)="goToPage(pIndex)">
                    {{ pIndex + 1 }}
                </a>
            </li>
            }

            <li class="page-item" [class.disabled]="isLastPage">
                <a class="page-link" href="javascript:void(0)" (click)="goToNextPage()" aria-label="Next">
                    Next <span aria-hidden="true">&raquo;</span>
                </a>
            </li>

            <li class="page-item" [class.disabled]="isLastPage">
                <a class="page-link" href="javascript:void(0)" (click)="goToLastPage()" aria-label="Last">
                    Last <span aria-hidden="true">&raquo;&raquo;</span>
                </a>
            </li>

        </ul>
    </nav>
</div>

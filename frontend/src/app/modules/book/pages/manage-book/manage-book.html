<div class="p-2 container">
        <h2>Manage Book</h2>
       
    <hr>

        @if (errorMessage && errorMessage.length > 0) {
        <div class="alert alert-danger mt-2" role="alert">
                @for (msg of errorMessage; track msg) {
                <p class="p-0 m-0">{{ msg }}</p>
                }
            </div>
        }

        <div class="d-flex flex-wrap gap-5 mt-4">

                <div style="width: 150px;">
                        <img [src]="selectedPicture || 'images/default.png'" alt="Book Cover"
                class="rounded-1 shadow-sm"                 style="width: 150px; height: 200px; object-fit: cover;">

                        <div class="mt-2">
                                <input (change)="onFileSelected($event)" type="file"
                    class="form-control form-control-sm" id="formFile"                     accept="image/*">
                            </div>
                    </div>

                <div class="flex-grow-1" style="max-width: 600px;">
                        <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="title" placeholder="Book Title">
                            </div>
                        <div class="mb-3">
                                <label for="author" class="form-label">Author</label>
                                <input type="text" class="form-control" id="author" placeholder="Book Author">
                            </div>
                        <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" rows="4"
                    placeholder="Book Description"></textarea>
                            </div>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                                <button class="btn btn-outline-secondary" type="button">Cancel</button>
                                <button class="btn btn-primary" type="button">Save Book</button>
                            </div>
                    </div>

            </div>
</div>
